services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    ports:
      - "${BIND_HOST}:${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ${POSTGRES_DATA_PATH}:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    restart: unless-stopped
    ports:
      - "${BIND_HOST}:${API_PORT}:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  mcp:
    build: ./mcp
    restart: unless-stopped
    ports:
      - "${BIND_HOST}:${MCP_PORT}:3000"
    env_file: .env
    depends_on:
      - api
